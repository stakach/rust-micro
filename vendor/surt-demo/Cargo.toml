# SURT demo rootserver — a standalone seL4 root task that consumes the PUBLISHED
# `surt-sel4` crate from crates.io and runs the SURT ring-transport scenarios on
# the rust-micro kernel. It is NOT part of the kernel's build; the launch script
# (`build.sh`) builds it and stages the ELF as `.tmp/rootserver.elf`.
# Standalone workspace root so `cargo build` here never gets absorbed into the
# kernel package's directory tree.
[workspace]

[package]
name = "surt-demo"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "surt-demo"
path = "src/main.rs"

[dependencies]
# The seL4 binding for SURT, straight from crates.io — this demo is the
# downstream consumer that proves the published crate runs on this kernel.
# `default-features = false` keeps it core-only (no_std) for `-Z build-std=core`.
surt-sel4 = { version = "0.1", default-features = false }

[profile.release]
panic = "abort"
opt-level = 2
lto = false
debug = false
codegen-units = 1
overflow-checks = false

[profile.dev]
panic = "abort"
